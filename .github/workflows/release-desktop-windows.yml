name: Release Desktop Windows Native

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows-native:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is required."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=nortools-windows-x64-$tag.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "setup_name=nortools-windows-x64-$tag-setup.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup GraalVM JDK 25 + native-image
        uses: graalvm/setup-graalvm@v1.5.6
        with:
          java-version: "25"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - name: Verify Visual Studio C++ toolchain and Windows SDK
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at '$vswhere'"
          }

          $vsPath = (& $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Workload.NativeDesktop Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath).Trim()
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Missing required Visual Studio C++ components: Workload.NativeDesktop and/or VC.Tools.x86.x64"
          }

          $sdkComponents = @(
            "Microsoft.VisualStudio.Component.Windows11SDK.26100",
            "Microsoft.VisualStudio.Component.Windows11SDK.22621",
            "Microsoft.VisualStudio.Component.Windows10SDK.19041"
          )
          $sdkFound = $false
          foreach ($sdk in $sdkComponents) {
            $sdkPath = (& $vswhere -latest -products * -requires $sdk -property installationPath).Trim()
            if (-not [string]::IsNullOrWhiteSpace($sdkPath)) {
              Write-Host "Found Windows SDK component: $sdk"
              $sdkFound = $true
              break
            }
          }
          if (-not $sdkFound) {
            throw "Missing required Windows SDK component (checked: $($sdkComponents -join ', '))"
          }

          Write-Host "Visual Studio installation: $vsPath"

      - name: Build native Windows archive
        shell: pwsh
        run: |
          bazelisk build //desktop:native-windows-x64

      - name: Setup NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Locate archive
        id: locate
        shell: pwsh
        run: |
          $artifact = (bazelisk cquery --output=files //desktop:native-windows-x64 | Select-Object -First 1).Trim()
          if ([string]::IsNullOrWhiteSpace($artifact) -or -not (Test-Path $artifact)) {
            throw "Could not locate built archive for //desktop:native-windows-x64"
          }
          "artifact=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Prepare release files
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $archive = "release/${{ steps.meta.outputs.artifact_name }}"
          Copy-Item "${{ steps.locate.outputs.artifact }}" $archive -Force
          $setup = "release/${{ steps.meta.outputs.setup_name }}"
          $runNumber = [int]($env:GITHUB_RUN_NUMBER)
          $setupPatch = $runNumber % 65535
          if ($setupPatch -eq 0) { $setupPatch = 1 }
          $setupVersion = "0.0.$setupPatch"
          ./script/release/build_windows_nsis.ps1 -ZipFile $archive -Output $setup -ProductVersion $setupVersion

          $archiveHash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumFile = "$archive.sha256"
          "$archiveHash  ${{ steps.meta.outputs.artifact_name }}" | Out-File -FilePath $checksumFile -Encoding ascii
          $setupHash = (Get-FileHash -Path $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupChecksumFile = "$setup.sha256"
          "$setupHash  ${{ steps.meta.outputs.setup_name }}" | Out-File -FilePath $setupChecksumFile -Encoding ascii
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "checksum=$checksumFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "setup=$setup" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "setup_checksum=$setupChecksumFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Smoke install setup
        shell: pwsh
        run: |
          $setup = (Resolve-Path "${{ steps.package.outputs.setup }}").Path
          $p = Start-Process -FilePath $setup `
            -ArgumentList @("/S") `
            -Wait `
            -PassThru

          if ($p.ExitCode -ne 0) {
            throw "NSIS setup smoke install failed with exit code $($p.ExitCode)."
          }

          $installDir = Join-Path $env:LOCALAPPDATA "Programs\NorTools"
          foreach ($required in @("nortools.exe", "nortools-gui.exe", "nortools-updater.exe")) {
            $path = Join-Path $installDir $required
            if (-not (Test-Path $path)) {
              throw "NSIS setup smoke install did not create expected file: $path"
            }
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
            ${{ steps.package.outputs.setup }}
            ${{ steps.package.outputs.setup_checksum }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
            ${{ steps.package.outputs.setup }}
            ${{ steps.package.outputs.setup_checksum }}
          fail_on_unmatched_files: true
