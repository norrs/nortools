name: Docs Site

on:
  pull_request:
    paths:
      - "docs-site/**"
      - "docs/screenshots/**"
      - "cli_native/smoke/**"
      - "web/src/main/kotlin/no/norrs/nortools/web/WebPortal.kt"
      - "README.md"
      - "RFC.md"
      - ".github/workflows/docs-site.yml"
  push:
    branches: ["main"]
    paths:
      - "docs-site/**"
      - "docs/screenshots/**"
      - "cli_native/smoke/**"
      - "web/src/main/kotlin/no/norrs/nortools/web/WebPortal.kt"
      - "README.md"
      - "RFC.md"
      - ".github/workflows/docs-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    name: Bazel docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Build docs check target
        run: mise x -- bazelisk build //docs-site:check

  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install Hugo
        run: |
          sudo apt-get update
          sudo apt-get install -y hugo
      - name: Build docs site target
        run: mise x -- bazelisk build //docs-site:docs_site
      - name: Stage Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          tar -xzf bazel-bin/docs-site/docs_site_public.tar.gz -C _site
          test -f _site/index.html
          test -f _site/index.xml
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
